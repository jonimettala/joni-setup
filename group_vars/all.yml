---
# Customize these to your own needs

homebrew_taps: []

homebrew_formulae:
  - bash
  - gh       # GitHub CLI
  - nvm
  - pymupdf
  - awscli

homebrew_casks:
  - 1password-cli
  - copilot-cli
  - iterm2
  - raycast

dotfiles_dir: "{{ playbook_dir }}/dotfiles"
dotfiles_files:
  - .zshrc
  - .gitconfig
  - .gitignore_global

nvm_version: "v0.40.1"
default_node_version: "node"  # latest stable

# sdkman is only installed — install Java versions yourself: sdk install java
